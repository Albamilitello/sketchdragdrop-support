<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supporto App</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: #f5f5f7;
      color: #111;
      margin: 0;
      padding: 40px 20px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    input, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 14px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      background: #111;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: #777;
    }

    a {
      color: #111;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Supporto</h1>
    <p>
      Se hai problemi con l’app o vuoi fare una segnalazione, compila il form qui sotto.
    </p>

    <form action="https://formsubmit.co/alba.militello.98@protonmail.com" method="POST">
      <input type="hidden" name="_subject" value="Nuova richiesta supporto app">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://albamilitello.github.io/app-support/thanks.html">

      <div>
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" required>
      </div>

      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div>
        <label for="message">Messaggio</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit">Invia richiesta</button>
    </form>

    <div class="footer">
      Oppure scrivi direttamente a
      <a href="mailto:alba.militello.98@protonmail.com">alba.militello.98@protonmail.com</a>
    </div>
  </div>
</body>
</html>
